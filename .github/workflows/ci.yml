name: Haskell CI
on:
  workflow_run:
    workflows: ["OSV Scanner"]
    types: [completed]
  push:
    paths:
      - ".github/**"
      - "stack.yaml"
      - "src/**"
      - "test/**"
      - "lambdachain.cabal"
  pull_request:
    paths:
      - ".github/**"
      - "stack.yaml"
      - "src/**"
      - "test/**"
      - "lambdachain.cabal"
jobs:
  build:
    if: |
      github.event.workflow_run.conclusion == 'success' ||
      github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      # Binary keys should be Base64 encoded in GitHub Secrets
      ZKP_SIGNING_KEY: ${{ secrets.ZKP_SIGNING_KEY_B64 }}
      HASH_SALT: ${{ secrets.HASH_SALT_B64 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Haskell environment
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          cabal-version: "3.14.2.0"
          enable-stack: true
          stack-version: "3.7.1"
      - run: cabal update
      - run: cabal build --enable-tests
      - run: cabal test
